services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: YourStrong!Passw0rd
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - type: tmpfs
        target: /var/opt/mssql
        tmpfs:
          mode: 0777
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-C",
          "-S",
          "localhost",
          "-U",
          "SA",
          "-P",
          "YourStrong!Passw0rd",
          "-Q",
          "'SELECT 1'",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
