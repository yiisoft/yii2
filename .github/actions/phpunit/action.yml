---
name: PHPUnit Test Runner.
description: Run PHPUnit tests with coverage and configurable options.

inputs:
  additional-args:
    description: Additional PHPUnit arguments.
    default: "--log-junit junit.xml --verbose"
    required: false
    type: string
  configuration:
    description: PHPUnit configuration file.
    default: ""
    required: false
    type: string
  coverage-driver:
    description: Code coverage driver to use (pcov, xdebug, none).
    default: none
    required: false
    type: string
  coverage-file:
    description: Coverage output file name.
    default: coverage.xml
    required: false
    type: string
  coverage-format:
    description: Coverage report format (clover, html, xml).
    default: clover
    required: false
    type: string
  coverage-token:
    description: Codecov token for uploading coverage.
    default: ""
    required: false
    type: string
  debug:
    description: Display warnings in phpunit.
    default: ""
    required: false
    type: string
  exclude-group:
    description: Exclude group from phpunit.
    default: ""
    required: false
    type: string
  group:
    description: Include specific group in phpunit.
    default: ""
    required: false
    type: string
  path:
    description: Path to PHPUnit executable.
    default: vendor/bin/phpunit
    required: false
    type: string
  test-suite:
    description: Specific test suite to run.
    default: ""
    required: false
    type: string

runs:
  using: composite
  steps:
    - name: Run PHPUnit tests on Linux.
      if: runner.os != 'Windows'
      shell: bash
      env:
        ADDITIONAL_ARGS: ${{ inputs.additional-args }}
        CONFIG_INPUT: ${{ inputs.configuration }}
        COVERAGE_DRIVER: ${{ inputs.coverage-driver }}
        COVERAGE_FILE: ${{ inputs.coverage-file }}
        COVERAGE_FORMAT: ${{ inputs.coverage-format }}
        DEBUG_INPUT: ${{ inputs.debug }}
        EXCLUDE_GROUP_INPUT: ${{ inputs.exclude-group }}
        GROUP_INPUT: ${{ inputs.group }}
        PATH_INPUT: ${{ inputs.path }}
        SUITE_INPUT: ${{ inputs.test-suite }}
      run: |
        command=("$PATH_INPUT" "--colors=always")

        add_param() {
          if [ -n "$2" ]; then
            command+=("$1" "$2")
          fi
        }

        if [ -n "$COVERAGE_DRIVER" ] && [ "$COVERAGE_DRIVER" != "none" ]; then
          command+=("--coverage-$COVERAGE_FORMAT=$COVERAGE_FILE")
        fi

        add_param "--configuration" "$CONFIG_INPUT"
        add_param "--testsuite" "$SUITE_INPUT"
        add_param "--group" "$GROUP_INPUT"
        add_param "--exclude-group" "$EXCLUDE_GROUP_INPUT"

        if [ -n "$DEBUG_INPUT" ]; then
          read -r -a debug_args <<< "$DEBUG_INPUT"
          command+=("${debug_args[@]}")
        fi

        if [ -n "$ADDITIONAL_ARGS" ]; then
          read -r -a additional_args <<< "$ADDITIONAL_ARGS"
          command+=("${additional_args[@]}")
        fi

        printf 'PHPUnit command:'
        printf ' %q' "${command[@]}"
        printf '\n'

        "${command[@]}"

    - name: Run PHPUnit tests on Windows.
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        ADDITIONAL_ARGS: ${{ inputs.additional-args }}
        CONFIG_INPUT: ${{ inputs.configuration }}
        COVERAGE_DRIVER: ${{ inputs.coverage-driver }}
        COVERAGE_FILE: ${{ inputs.coverage-file }}
        COVERAGE_FORMAT: ${{ inputs.coverage-format }}
        DEBUG_INPUT: ${{ inputs.debug }}
        EXCLUDE_GROUP_INPUT: ${{ inputs.exclude-group }}
        GROUP_INPUT: ${{ inputs.group }}
        PATH_INPUT: ${{ inputs.path }}
        SUITE_INPUT: ${{ inputs.test-suite }}
      run: |
        $command = @($env:PATH_INPUT, '--colors=always')

        function Add-Param([string] $Name, [string] $Value) {
          if ($Value) {
            $script:command += @($Name, $Value)
          }
        }

        if ($env:COVERAGE_DRIVER -and $env:COVERAGE_DRIVER -ne 'none') {
          $command += "--coverage-$($env:COVERAGE_FORMAT)=$($env:COVERAGE_FILE)"
        }

        Add-Param '--configuration' $env:CONFIG_INPUT
        Add-Param '--testsuite' $env:SUITE_INPUT
        Add-Param '--group' $env:GROUP_INPUT
        Add-Param '--exclude-group' $env:EXCLUDE_GROUP_INPUT

        if ($env:DEBUG_INPUT) {
          $command += $env:DEBUG_INPUT -split ' '
        }

        if ($env:ADDITIONAL_ARGS) {
          $command += $env:ADDITIONAL_ARGS -split ' '
        }

        Write-Host "PHPUnit command: $($command -join ' ')"
        $executable = $command[0]
        $arguments = $command[1..($command.Count - 1)]
        & $executable @arguments

    - name: Upload test results to Codecov.
      if: ${{ !cancelled() && inputs.coverage-driver != 'none' }}
      uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
      with:
        token: ${{ inputs.coverage-token }}

    - name: Upload coverage to Codecov.
      if: ${{ !cancelled() && inputs.coverage-driver != 'none' }}
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
      with:
        files: ./${{ inputs.coverage-file }}
        token: ${{ inputs.coverage-token }}
