name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches:
      - master
      - main
      - '22.0'
    paths: &paths
      - '.github/**.yml'
      - '.github/**.yaml'
  pull_request:
    paths: *paths

permissions:
  actions: read # Required by zizmor when reading workflow metadata through the API.
  contents: read # Required to read workflow files.

jobs:
  zizmor:
    uses: yiisoft/yii2-actions/.github/workflows/zizmor.yml@f14284136c895c1af50b8ed5c80d83afa31461e7 # master
