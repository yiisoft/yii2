name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches:
      - master
      - main
    paths:
      - '.github/**.yml'
      - '.github/**.yaml'
  pull_request:
    paths:
      - '.github/**.yml'
      - '.github/**.yaml'

permissions:
  actions: read # Required by zizmor when reading workflow metadata through the API.
  contents: read # Required to read workflow files.

jobs:
  zizmor:
    uses: yiisoft/yii2-actions/.github/workflows/zizmor.yml@def75f00ad24c3d66a827d2b2eb5e0baa1638871 # master
